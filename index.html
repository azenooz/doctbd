async function callClaude(system, user, maxTokens = 7000) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:maxTokens, system, messages:[{role:"user",content:user}] }),
  });
  if (!res.ok) throw new Error(`API ${res.status}`);
  const data = await res.json();
  if (data.error) throw new Error(data.error.message || "API error");
  const raw = data.content?.find(b => b.type==="text")?.text || "{}";
  const cleaned = raw.replace(/```json\s*/g,"").replace(/```\s*/g,"").trim();
  try {
    return JSON.parse(cleaned);
  } catch(e) {
    const m = cleaned.match(/(\{[\s\S]*)/);
    if (m) { try { return JSON.parse(m[1]); } catch(_) {} }
    throw new Error("Invalid JSON response — try a simpler query.");
  }
}

async function callClaudeText(system, messages, maxTokens = 1200) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers:{"Content-Type":"application/json","x-api-key":ANTHROPIC_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:maxTokens, system, messages }),
  });
  const data = await res.json();
  return data.content?.find(b => b.type==="text")?.text || "";
}

function searchSystem(ins) {
  return `You are DOCTBD's patient search engine. Return ONLY valid JSON, no markdown, no explanation.
Return exactly 4 doctors.

Fields for top-level object:
- isDiagnosis (bool), detectedSpecialty, keyProcedure, explanation (1 sentence), contextNote (2 sentences on what to look for), secondOpinionNote

Fields for each doctor in "doctors" array:
IDENTITY: id, name, title, specialty, subspecialty, npi, npiLookupUrl ("https://npiregistry.cms.hhs.gov/search?number=NPI"), stateBoardUrl (real state board URL), licenseStatus, boardCertified, boardCertifications (array), medicalSchool, residency, yearsExperience
PRACTICE: proceduresPerYear, topProcedures (3 items), practiceLocations (2-3 objects each with name/address/phone/type), phone, waitTimeDays, telehealth
INSURANCE: insurers (8-12 plans), acceptsInsurance (${ins ? `true if "${ins}" is in insurers` : "true"})
SCORE: score (0-100), scoreBreakdown {volume(max 35), record(max 25), license(max 15), board(max 15), network(max 10)} — must sum to score
LEGAL: lawsuits (0-2), boardActions (0-1), lawsuitLinks (array, each: case/year/outcome/searchUrl using courtlistener.com), disciplinaryHistory (empty array if clean; if any: {year,action,reason,resolved,resolvedNote}), medicareOptOut (bool, rare), medicareOptOutNote (string or null)
CLINICAL: clinicalNote (2 sentences, only if diagnosis search), secondOpinionRecommended (bool)
OUTCOMES: outcomes {readmission30Day, readmissionNational, complicationRate, complicationNational, patientSatisfaction, note}
OVERTREATMENT: overtreamentRisk — ONLY for high-variation procedures (spine fusion, knee/hip replacement, hysterectomy, cardiac stents): {applicable:true, procedure, regionalRate, nationalRate, riskLevel ("low"|"elevated"|"high"), plain (1-2 sentence plain English warning), sourceNote}. For all other procedures set overtreamentRisk:{applicable:false}
HOSPITAL: hospitalQuality {name, mrsa, mrsaNational, surgicalInfection, surgicalInfectionNational, nurseRatio, nurseRatioNote, cmsRating (1-5), cmsRatingNote, hospitalCompareUrl}

Use realistic data. Good surgeons should be 20-40% below national readmission/complication averages.${ins ? ` Mark acceptsInsurance:true when "${ins}" appears in insurers array.` : ""}`;
}

// ─── Primitives ───────────────────────────────────────────────────────────────
function Tag({ children, color="gray", size="sm" }) {
  const s = {
    gray:  {bg:C.bgMuted, text:C.textSoft, bd:C.border},
    green: {bg:C.greenL,  text:C.green,    bd:C.greenBorder},
    red:   {bg:C.redL,    text:C.red,       bd:C.redBorder},
    amber: {bg:C.amberL,  text:C.amber,    bd:C.amberBorder},
    blue:  {bg:C.blueL,   text:C.blue,     bd:C.blueBorder},
    orange:{bg:C.orangeL, text:C.orange,   bd:C.orangeBorder},
    gold:  {bg:"#FDF8E1", text:C.gold,     bd:"#E8D46A"},
  }[color] || {bg:C.bgMuted, text:C.textSoft, bd:C.border};
  return (
    <span style={{ background:s.bg, color:s.text, border:`1px solid ${s.bd}`, borderRadius:20, padding:size==="xs"?"2px 7px":"3px 10px", fontSize:size==="xs"?10:11, fontFamily:"'DM Mono',monospace", fontWeight:600, letterSpacing:"0.02em", whiteSpace:"nowrap", display:"inline-flex", alignItems:"center", gap:3 }}>
      {children}
    </span>
  );
}

function ScoreRing({ score, size=52, animate=false }) {
  const [disp, setDisp] = useState(animate ? 0 : score);
  useEffect(() => {
    if (!animate || score == null) return;
    let start = null;
    const step = ts => { if (!start) start=ts; const p=Math.min((ts-start)/900,1); setDisp(Math.round((1-Math.pow(1-p,3))*score)); if(p<1) requestAnimationFrame(step); };
    const t = setTimeout(()=>requestAnimationFrame(step), 80);
    return ()=>clearTimeout(t);
  }, [animate, score]);

  if (score == null) return <div style={{ width:size, height:size, borderRadius:"50%", border:`2px solid ${C.border}`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textSoft }}>N/A</div>;
  const col = score>=88?C.green:score>=72?C.amber:C.red;
  const r=size/2-5, circ=2*Math.PI*r, off=circ-(disp/100)*circ, cx=size/2;
  return (
    <div style={{ position:"relative", width:size, height:size, flexShrink:0 }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
        <circle cx={cx} cy={cx} r={r} fill="none" stroke={C.bgMuted} strokeWidth="4.5"/>
        <circle cx={cx} cy={cx} r={r} fill="none" stroke={col} strokeWidth="4.5" strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" style={{ transition:"stroke-dashoffset 0.05s linear" }}/>
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
        <span style={{ fontFamily:"'DM Mono',monospace", fontSize:size>50?15:12, fontWeight:700, color:col, lineHeight:1 }}>{disp}</span>
        {size>50 && <span style={{ fontFamily:"'DM Mono',monospace", fontSize:7, color:C.textTiny, letterSpacing:"0.08em", marginTop:1 }}>SCORE</span>}
      </div>
    </div>
  );
}

          <div>
            <div style={{ fontFamily:"'Lora',serif", fontSize:17, fontWeight:700, color:C.text, marginBottom:2 }}>How the DOCTBD Score Works</div>
            {name && <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:12, color:C.textMid }}>{name}</div>}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <ScoreRing score={score} size={52} animate={true}/>
            <button onClick={onClose} style={{ background:C.bgMuted, border:"none", borderRadius:"50%", width:26, height:26, cursor:"pointer", color:C.textSoft, fontSize:13, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
          </div>
        </div>
        <div style={{ padding:"16px 22px" }}>
          <div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textTiny, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:10 }}>Score components · 100 pts total</div>
          <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:18 }}>

                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:5 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                      <span style={{ fontSize:13 }}>{r.icon}</span>
                      <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, fontWeight:600, color:C.text }}>{r.label}</span>
                    </div>
                    <span style={{ fontFamily:"'DM Mono',monospace", fontSize:13, fontWeight:700, color:col }}>{earned??"—"}<span style={{ color:C.textTiny, fontWeight:400 }}>/{r.max}</span></span>
                  </div>
                  <div style={{ height:4, background:C.bgMuted, borderRadius:2, marginBottom:5, overflow:"hidden" }}>
                    {pct!=null && <div style={{ height:"100%", width:`${pct}%`, background:col, borderRadius:2, transition:"width 0.8s ease" }}/>}
                  </div>
                  <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:11, color:C.textSoft, lineHeight:1.55 }}>{r.desc}</div>
                </div>
              );

          <div style={{ background:C.bgMuted, borderRadius:9, padding:"10px 13px" }}>
            <div style={{ fontFamily:"'DM Mono',monospace", fontSize:8, color:C.textTiny, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:5 }}>Data sources</div>

                <span style={{ color:C.orange, fontFamily:"'DM Mono',monospace", fontSize:9, fontWeight:700 }}>→</span>
                <span style={{ fontFamily:"'DM Mono',monospace", fontSize:9, fontWeight:700, color:C.textMid }}>{s}</span>
                <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:10, color:C.textSoft }}>· {n}</span>
              </div>

}

              {doc.npiLookupUrl && <a href={doc.npiLookupUrl} target="_blank" rel="noopener noreferrer" style={{ display:"inline-flex", alignItems:"center", gap:5, background:C.blueL, border:`1px solid ${C.blueBorder}`, borderRadius:8, padding:"6px 11px", textDecoration:"none", fontFamily:"'DM Mono',monospace", fontSize:9, color:C.blue }}>NPI Registry ↗</a>}
              {doc.stateBoardUrl && <a href={doc.stateBoardUrl} target="_blank" rel="noopener noreferrer" style={{ display:"inline-flex", alignItems:"center", gap:5, background:C.bgMuted, border:`1px solid ${C.border}`, borderRadius:8, padding:"6px 11px", textDecoration:"none", fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textMid }}>State Board License ↗</a>}

                <div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textTiny, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:9 }}>Procedure Outcomes · {doc.outcomes.note&&<span style={{ textTransform:"none", letterSpacing:0, color:C.textTiny, fontSize:8 }}>{doc.outcomes.note}</span>}</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
                  {[
                    { l:"30-Day Readmission", mine:doc.outcomes.readmission30Day, nat:doc.outcomes.readmissionNational, unit:"%" },
                    { l:"Complication Rate",  mine:doc.outcomes.complicationRate,  nat:doc.outcomes.complicationNational,  unit:"%" },
                  ].map(s => {
                    const better = s.mine < s.nat;
                    return (
                      <div key={s.l} style={{ border:`1px solid ${better?C.greenBorder:C.amberBorder}`, background:better?C.greenL:C.amberL, borderRadius:10, padding:"12px 14px" }}>

                        <div style={{ display:"flex", alignItems:"baseline", gap:6, marginBottom:4 }}>

                          <span style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:C.textSoft }}>vs {s.nat}{s.unit} national</span>
                        </div>
                        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:11, color:better?C.green:C.amber, fontWeight:600 }}>{better?`${Math.round((1-s.mine/s.nat)*100)}% better than average`:`${Math.round((s.mine/s.nat-1)*100)}% above average`}</div>
                      </div>
                    );
                  })}
                </div>
                {doc.outcomes.patientSatisfaction && (
                  <div style={{ border:`1px solid ${C.border}`, borderRadius:9, padding:"10px 13px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                    <span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:C.textMid }}>Patient satisfaction score</span>
                    <span style={{ fontFamily:"'DM Mono',monospace", fontSize:16, fontWeight:700, color:doc.outcomes.patientSatisfaction>=90?C.green:C.amber }}>{doc.outcomes.patientSatisfaction}%</span>

              <div style={{ background:C.bgMuted, borderRadius:10, padding:"14px", marginBottom:14, fontFamily:"'DM Sans',sans-serif", fontSize:13, color:C.textSoft }}>Outcome data not available for this provider.</div>
            )}

            {/* Overtreatment risk */}
            {doc.overtreamentRisk?.applicable && (
              <div style={{ marginBottom:16 }}>
                <div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textTiny, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:9 }}>Regional Overtreatment Risk · {doc.overtreamentRisk.procedure}</div>
                <div style={{ background:doc.overtreamentRisk.riskLevel==="high"?C.redL:doc.overtreamentRisk.riskLevel==="elevated"?C.amberL:C.greenL, border:`1px solid ${doc.overtreamentRisk.riskLevel==="high"?C.redBorder:doc.overtreamentRisk.riskLevel==="elevated"?C.amberBorder:C.greenBorder}`, borderRadius:11, padding:"13px 15px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                    <div>
                      <div style={{ fontFamily:"'DM Mono',monospace", fontSize:10, fontWeight:700, color:doc.overtreamentRisk.riskLevel==="high"?C.red:doc.overtreamentRisk.riskLevel==="elevated"?C.amber:C.green, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:2 }}>
                        {doc.overtreamentRisk.riskLevel==="high"?"⚠ High overtreatment area":doc.overtreamentRisk.riskLevel==="elevated"?"⚠ Elevated overtreatment area":"✓ Normal variation"}
                      </div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontFamily:"'DM Mono',monospace", fontSize:18, fontWeight:700, color:doc.overtreamentRisk.riskLevel==="low"?C.green:C.amber }}>{doc.overtreamentRisk.regionalRate}<span style={{ fontSize:10, fontWeight:400 }}>/1k</span></div>
                      <div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textSoft }}>vs {doc.overtreamentRisk.nationalRate}/1k national</div>
                    </div>
                  </div>
                  <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:C.text, lineHeight:1.65, marginBottom:8 }}>{doc.overtreamentRisk.plain}</div>

                </div>
              </div>
            )}

            {/* Hospital quality */}
            {doc.hospitalQuality && (
              <div>
                <div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textTiny, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:9 }}>Hospital Quality · {doc.hospitalQuality.name}</div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:7, marginBottom:9 }}>
                  {[
                    { l:"MRSA Rate",          v:doc.hospitalQuality.mrsa,             note:doc.hospitalQuality.mrsaNational },
                    { l:"Surgical Infection", v:doc.hospitalQuality.surgicalInfection, note:doc.hospitalQuality.surgicalInfectionNational },

                      <div style={{ fontFamily:"'DM Mono',monospace", fontSize:8, color:C.textSoft, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:3 }}>{s.l}</div>
                      <div style={{ fontFamily:"'DM Mono',monospace", fontSize:13, fontWeight:700, color:C.text, marginBottom:2 }}>{s.v}</div>
                      <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:10, color:C.textSoft, lineHeight:1.4 }}>{s.note}</div>

          {/* ── LOCATIONS ── */}

            {(doc.practiceLocations||[]).map((loc,i)=>(

            {ins && (
              <div style={{ background:doc.acceptsInsurance?C.greenL:C.redL, border:`1px solid ${doc.acceptsInsurance?C.greenBorder:C.redBorder}`, borderRadius:10, padding:"10px 13px", marginBottom:12, fontFamily:"'DM Sans',sans-serif", fontSize:13, color:doc.acceptsInsurance?C.green:C.red }}>

            <div style={{ background:C.amberL, border:`1px solid ${C.amberBorder}`, borderRadius:9, padding:"9px 12px", fontFamily:"'DM Sans',sans-serif", fontSize:12, color:C.amber, lineHeight:1.6 }}>
              ⚠ Insurance networks change frequently. Always call the office to verify your specific plan before your appointment.
            </div>

          {/* ── LEGAL RECORD ── */}
          {tab==="legal" && <>
            {/* Medicare opt-out warning */}
            {doc.medicareOptOut && (
              <div style={{ background:C.redL, border:`1px solid ${C.redBorder}`, borderRadius:11, padding:"12px 15px", marginBottom:14 }}>
                <div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.red, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:4 }}>⚠ Medicare Opt-Out</div>
                <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:C.red, lineHeight:1.6 }}>This doctor has <strong>opted out of Medicare</strong>. Even if you have Medicare, you will be billed at full cash rates. Verify costs before booking.</div>
                {doc.medicareOptOutNote && <div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.red, marginTop:5 }}>{doc.medicareOptOutNote}</div>}
              </div>
            )}

            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
              {[
                {l:"Malpractice Suits", v:doc.lawsuits??0, warn:doc.lawsuits>0, sub:doc.lawsuits===0?"Clean 10-yr record":"See details below"},
                {l:"Board Actions", v:doc.boardActions??0, warn:doc.boardActions>0, sub:doc.boardActions===0?"No disciplinary actions":"See history below"},
              ].map(s=>(
                <div key={s.l} style={{ background:s.warn?C.redL:C.greenL, border:`1px solid ${s.warn?C.redBorder:C.greenBorder}`, borderRadius:10, padding:"12px 14px", textAlign:"center" }}>

                  <div style={{ fontFamily:"'DM Mono',monospace", fontSize:22, fontWeight:700, color:s.warn?C.red:C.green }}>{s.v}</div>

            {/* Disciplinary history — plain English */}
            {doc.disciplinaryHistory?.length > 0 && (
              <div style={{ marginBottom:14 }}>
                <div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textTiny, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:8 }}>Disciplinary History · Parsed from State Board Records</div>
                {doc.disciplinaryHistory.map((d,i)=>(
                  <div key={i} style={{ border:`1px solid ${d.resolved?C.amberBorder:C.redBorder}`, background:d.resolved?C.amberL:C.redL, borderRadius:9, padding:"11px 13px", marginBottom:7 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:4 }}>
                      <div style={{ fontFamily:"'DM Mono',monospace", fontSize:10, fontWeight:700, color:d.resolved?C.amber:C.red }}>{d.action}</div>
                      <span style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textSoft }}>{d.year}</span>
                    </div>
                    <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:12, color:C.text, lineHeight:1.55, marginBottom:d.resolvedNote?5:0 }}>Reason: {d.reason}</div>
                    {d.resolvedNote && <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:11, color:d.resolved?C.green:C.red, marginTop:3 }}>✓ {d.resolvedNote}</div>}
                  </div>
                ))}
                <div style={{ fontFamily:"'DM Mono',monospace", fontSize:8, color:C.textTiny, marginTop:2 }}>Parsed from state medical board public records. Always verify directly with the state board.</div>
              </div>
            )}

            {/* Clean board record */}
            {(!doc.disciplinaryHistory || doc.disciplinaryHistory.length===0) && doc.boardActions===0 && (
              <div style={{ background:C.greenL, border:`1px solid ${C.greenBorder}`, borderRadius:10, padding:"11px 14px", marginBottom:14, fontFamily:"'DM Sans',sans-serif", fontSize:13, color:C.green }}>✓ No disciplinary actions found in state board records.</div>
            )}

            {/* Malpractice cases */}
            {doc.lawsuits>0 && doc.lawsuitLinks?.length>0 && (
              <div style={{ marginBottom:14 }}>
                <div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textTiny, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:8 }}>Malpractice Records</div>
                {doc.lawsuitLinks.map((l,i)=>(
                  <a key={i} href={l.searchUrl} target="_blank" rel="noopener noreferrer" style={{ textDecoration:"none", display:"block", marginBottom:6 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"11px 13px", background:C.redL, border:`1px solid ${C.redBorder}`, borderRadius:9 }}>
                      <div>
                        <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, fontWeight:700, color:C.red }}>{l.case}</div>
                        <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:11, color:C.textSoft, marginTop:2 }}>{l.year}{l.outcome?` · ${l.outcome}`:""}</div>
                      </div>
                      <span style={{ fontFamily:"'DM Mono',monospace", fontSize:10, color:C.red, flexShrink:0, marginLeft:10 }}>Search CourtListener ↗</span>
                    </div>
                  </a>
                ))}
                <div style={{ fontFamily:"'DM Mono',monospace", fontSize:8, color:C.textTiny, marginTop:4 }}>Links open public CourtListener search. Full documents via PACER ($0.10/page).</div>
              </div>
            )}
            {doc.lawsuits===0 && <div style={{ background:C.greenL, border:`1px solid ${C.greenBorder}`, borderRadius:10, padding:"11px 14px", marginBottom:14, fontFamily:"'DM Sans',sans-serif", fontSize:13, color:C.green }}>✓ No malpractice suits found in public court records (10-year lookback).</div>}

            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              {doc.npiLookupUrl && <a href={doc.npiLookupUrl} target="_blank" rel="noopener noreferrer" style={{ display:"inline-flex", alignItems:"center", gap:4, background:C.blueL, border:`1px solid ${C.blueBorder}`, borderRadius:8, padding:"6px 11px", textDecoration:"none", fontFamily:"'DM Mono',monospace", fontSize:9, color:C.blue }}>NPI Registry ↗</a>}
              {doc.stateBoardUrl && <a href={doc.stateBoardUrl} target="_blank" rel="noopener noreferrer" style={{ display:"inline-flex", alignItems:"center", gap:4, background:C.bgMuted, border:`1px solid ${C.border}`, borderRadius:8, padding:"6px 11px", textDecoration:"none", fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textMid }}>State Board License ↗</a>}
              <a href={`https://www.courtlistener.com/?q=${encodeURIComponent(doc.name)}&type=r`} target="_blank" rel="noopener noreferrer" style={{ display:"inline-flex", alignItems:"center", gap:4, background:C.redL, border:`1px solid ${C.redBorder}`, borderRadius:8, padding:"6px 11px", textDecoration:"none", fontFamily:"'DM Mono',monospace", fontSize:9, color:C.red }}>Search CourtListener ↗</a>
            </div>
          </>}
        </div>
      </div>
    </div>
  );
}

// ─── Doctor Card ──────────────────────────────────────────────────────────────
function DoctorCard({ doc, onClick, onScoreClick, index, ins }) {
  const [hov, setHov] = useState(false);
  const initials = doc.name.replace("Dr.","").trim().split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  return (
    <div onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ background:C.bgCard, border:`1.5px solid ${hov?C.orange:C.border}`, borderRadius:14, overflow:"hidden", transition:"all 0.18s", boxShadow:hov?"0 6px 22px rgba(232,101,10,0.09)":"0 1px 4px rgba(0,0,0,0.04)", animation:"fadeUp 0.38s ease both", animationDelay:`${index*0.07}s` }}>
      <div onClick={()=>onClick(doc)} style={{ padding:"15px 16px", cursor:"pointer" }}>
        <div style={{ display:"flex", gap:12, alignItems:"flex-start" }}>
          <div style={{ width:40, height:40, borderRadius:"50%", flexShrink:0, background:hov?C.orange:C.bgMuted, border:`2px solid ${hov?C.orange:C.border}`, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'DM Mono',monospace", fontSize:12, fontWeight:700, color:hov?"#fff":C.orange, transition:"all 0.18s" }}>{initials}</div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap", marginBottom:2 }}>
              <span style={{ fontFamily:"'Lora',serif", fontSize:15, fontWeight:700, color:C.text }}>{doc.name}</span>
              {doc.title && <span style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textSoft }}>{doc.title}</span>}
              {doc.boardCertified && <Tag color="gold" size="xs">Board Cert.</Tag>}
            </div>
            <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:12, color:C.textMid, marginBottom:6 }}>
              {doc.subspecialty&&<><strong>{doc.subspecialty}</strong> · </>}
              {doc.practiceLocations?.[0]?.name || doc.hospital}
              {doc.practiceLocations?.length>1 && <span style={{ color:C.textSoft }}> +{doc.practiceLocations.length-1} locations</span>}
              {doc.city && <span> · {doc.city}</span>}
              {doc.distance && doc.distance!=="—" && <span style={{ color:C.blue, fontWeight:600 }}> · {doc.distance}</span>}
            </div>
            <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginBottom:7 }}>
              <Tag color="orange">{doc.specialty}</Tag>
              <Tag color={doc.licenseStatus==="Active"?"green":"red"}>{doc.licenseStatus==="Active"?"✓ Licensed":"⚠ Inactive"}</Tag>
              {doc.lawsuits===0
                ? <Tag color="green">⚖ 0 Lawsuits</Tag>
                : doc.lawsuits>0
                  ? (doc.lawsuitLinks?.length>0
                    ? <a href={doc.lawsuitLinks[0].searchUrl} target="_blank" rel="noopener noreferrer" style={{ textDecoration:"none" }} onClick={e=>e.stopPropagation()}>
                        <span style={{ background:doc.lawsuits===1?C.amberL:C.redL, color:doc.lawsuits===1?C.amber:C.red, border:`1px solid ${doc.lawsuits===1?C.amberBorder:C.redBorder}`, borderRadius:20, padding:"3px 10px", fontSize:11, fontFamily:"'DM Mono',monospace", fontWeight:600, display:"inline-flex", alignItems:"center", gap:3, textDecoration:"underline dotted" }}>⚖ {doc.lawsuits} Lawsuit{doc.lawsuits>1?"s":""} ↗</span>
                      </a>
                    : <Tag color={doc.lawsuits===1?"amber":"red"}>⚖ {doc.lawsuits} Lawsuit{doc.lawsuits>1?"s":""}</Tag>)
                  : null}
              {doc.boardActions>0 && <Tag color="red">🏛 {doc.boardActions} Board Action{doc.boardActions>1?"s":""}</Tag>}
              {doc.medicareOptOut && <Tag color="red">⚠ Medicare Opt-Out</Tag>}
              {ins && (doc.acceptsInsurance ? <Tag color="green">✓ {ins}</Tag> : <Tag color="gray">✗ {ins}</Tag>)}
              {doc.telehealth && <Tag color="blue">📱 Telehealth</Tag>}
              {doc.waitTimeDays!=null && <Tag color="blue">⏱ {doc.waitTimeDays}d wait</Tag>}
            </div>
            <div style={{ display:"flex", gap:16, flexWrap:"wrap" }}>
              {[{l:"Procedures/yr",v:doc.proceduresPerYear?.toLocaleString()??"—"},{l:"Yrs Exp",v:doc.yearsExperience??"—"},{l:"Locations",v:doc.practiceLocations?.length??1}].map(s=>(
                <div key={s.l}>
                  <div style={{ fontFamily:"'DM Mono',monospace", fontSize:8, color:C.textTiny, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:1 }}>{s.l}</div>
                  <div style={{ fontFamily:"'DM Mono',monospace", fontSize:12, fontWeight:700, color:C.text }}>{s.v}</div>
                </div>
              ))}
            </div>
            {doc.clinicalNote && (
              <div style={{ marginTop:8, padding:"6px 10px", background:C.greenL, border:`1px solid ${C.greenBorder}`, borderRadius:7, fontFamily:"'DM Sans',sans-serif", fontSize:12, color:C.green, lineHeight:1.55 }}>💡 {doc.clinicalNote}</div>
            )}
          </div>
          <div onClick={e=>{e.stopPropagation();onScoreClick(doc);}} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:3, cursor:"pointer" }}>
            <ScoreRing score={doc.score} size={48}/>
            <span style={{ fontFamily:"'DM Mono',monospace", fontSize:8, color:C.blue, textDecoration:"underline dotted" }}>How?</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── Medical Records Panel ────────────────────────────────────────────────────
function RecordsPanel({ onClose, onSearchFromRecords }) {
  const [recordText, setRecordText] = useState("");
  const [pasteText, setPasteText]   = useState("");
  const [fileName, setFileName]     = useState("");
  const [stage, setStage]           = useState("upload");
  const [activeTab, setActiveTab]   = useState("summary");
  const [analysis, setAnalysis]     = useState(null);
  const [messages, setMessages]     = useState([]);
  const [input, setInput]           = useState("");
  const [chatLoading, setChatLoading] = useState(false);
  const [analyzeError, setAnalyzeError] = useState(null);
  const fileRef   = useRef(null);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [messages]);

  async function loadRecords(text, name) {
    setRecordText(text);
    setFileName(name || "Pasted records");
    setStage("analyzing");
    setAnalyzeError(null);
    try {
      const result = await callClaude(recordsAnalyzeSystem(), `Analyze these medical records:\n\n${text}`, 2000);
      setAnalysis(result);
      setStage("ready");
      setActiveTab("summary");
    } catch(e) {
      setAnalyzeError("Could not analyze records — you can still ask questions below.");
      setStage("ready");
    }
  }

  function handleFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => loadRecords(e.target.result, file.name);
    reader.readAsText(file);
  }

  async function sendChat(text) {
    const q = text || input.trim();
    if (!q || !recordText) return;
    setInput("");
    setActiveTab("ask");
    const newMsgs = [...messages, { role:"user", text:q }];
    setMessages(newMsgs);
    setChatLoading(true);
    try {
      const apiMsgs = newMsgs.map(m => ({ role:m.role==="assistant"?"assistant":"user", content:m.text }));
      const reply = await callClaudeText(recordsChatSystem(recordText), apiMsgs, 900);
      setMessages(prev => [...prev, { role:"assistant", text:reply }]);
    } catch(e) {
      setMessages(prev => [...prev, { role:"assistant", text:"Sorry, couldn't process that. Try again." }]);

  const TABS = [

        <div style={{ padding:"14px 18px", borderBottom:`1px solid ${C.border}`, display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0 }}>
          <div>
            <div style={{ fontFamily:"'Lora',serif", fontSize:16, fontWeight:700, color:C.text }}>My Medical Records</div>
            {fileName && stage!=="upload" && <div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textSoft, marginTop:1 }}>{fileName}</div>}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:7 }}>
            {stage==="ready" && <button onClick={()=>{setStage("upload");setRecordText("");setFileName("");setAnalysis(null);setMessages([]);setPasteText("");}} style={{ background:C.bgMuted, border:`1px solid ${C.border}`, borderRadius:7, padding:"5px 10px", cursor:"pointer", fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textMid }}>New records</button>}

        {stage==="upload" && (

            <div style={{ fontFamily:"'Lora',serif", fontSize:17, fontWeight:700, color:C.text, marginBottom:5, textAlign:"center" }}>Upload your medical records</div>

            <div style={{ fontFamily:"'DM Mono',monospace", fontSize:8, color:C.textTiny, textAlign:"center", marginBottom:20 }}>Processed in your browser only · Nothing stored or sent anywhere</div>

                {analysis?.medications?.length>0 && <div><div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textTiny, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:7 }}>Medications</div>{analysis.medications.map((m,i)=><div key={i} style={{ display:"flex", gap:8, padding:"7px 10px", background:C.bgMuted, borderRadius:7, marginBottom:4 }}><span style={{ fontSize:12 }}>💊</span><span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:12, color:C.textMid }}>{m}</span></div>)}</div>}
                {analysis?.labFlags?.length>0 && <div><div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textTiny, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:7 }}>Lab flags</div>{analysis.labFlags.map((f,i)=><div key={i} style={{ display:"flex", gap:8, padding:"7px 10px", background:C.amberL, border:`1px solid ${C.amberBorder}`, borderRadius:7, marginBottom:4 }}><span style={{ fontSize:12 }}>⚠️</span><span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:12, color:C.amber }}>{f}</span></div>)}</div>}
                <div style={{ paddingTop:4 }}><div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textTiny, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:7 }}>Quick questions</div><div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>{QUICK_QS.map(q=><button key={q} onClick={()=>sendChat(q)} style={{ background:C.blueL, border:`1px solid ${C.blueBorder}`, borderRadius:20, padding:"4px 11px", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", fontSize:11, color:C.blue }}>{q}</button>)}</div></div>
              </div>
            )}

            {activeTab==="plan" && (
              <div style={{ padding:"16px 18px", display:"flex", flexDirection:"column", gap:14 }}>
                {analysis?.preVisitPlan ? <>

                  {analysis.preVisitPlan.bringToAppointment?.length>0 && <div><div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:10 }}><span style={{ fontSize:18 }}>📋</span><div style={{ fontFamily:"'Lora',serif", fontSize:15, fontWeight:700, color:C.text }}>Bring to your appointment</div></div>{analysis.preVisitPlan.bringToAppointment.map((b,i)=><div key={i} style={{ display:"flex", gap:8, padding:"8px 0" }}><span style={{ color:C.green, fontFamily:"'DM Mono',monospace", fontSize:11 }}>✓</span><span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:C.textMid }}>{b}</span></div>)}</div>}
                  {analysis.preVisitPlan.redFlags?.length>0 && <div><div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:10 }}><span style={{ fontSize:18 }}>🚨</span><div style={{ fontFamily:"'Lora',serif", fontSize:15, fontWeight:700, color:C.text }}>When to seek immediate care</div></div>{analysis.preVisitPlan.redFlags.map((r,i)=><div key={i} style={{ display:"flex", gap:8, padding:"9px 12px", background:C.redL, border:`1px solid ${C.redBorder}`, borderRadius:8, marginBottom:5 }}><span style={{ color:C.red, fontFamily:"'DM Mono',monospace", fontSize:11 }}>!</span><span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:C.red, lineHeight:1.55 }}>{r}</span></div>)}</div>}
                </> : <div style={{ textAlign:"center", padding:"32px 0", fontFamily:"'DM Sans',sans-serif", fontSize:13, color:C.textSoft }}>Pre-visit plan not available for these records.</div>}
              </div>
            )}

            {activeTab==="specialist" && (
              <div style={{ padding:"16px 18px" }}>
                {analysis?.specialistNeeded?.needed ? (
                  <div>
                    <div style={{ background:C.orangeL, border:`1px solid ${C.orangeBorder}`, borderRadius:12, padding:"14px 16px", marginBottom:14 }}>
                      <div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.orange, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:5 }}>Specialist recommended from your records</div>
                      <div style={{ fontFamily:"'Lora',serif", fontSize:16, fontWeight:700, color:C.text, marginBottom:4 }}>{analysis.specialistNeeded.type}</div>
                      <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:C.textMid, lineHeight:1.65, marginBottom:12 }}>{analysis.specialistNeeded.reason}</div>
                      <button onClick={()=>{ onClose(); onSearchFromRecords && onSearchFromRecords(analysis.specialistNeeded.searchQuery); }} style={{ background:C.orange, border:"none", borderRadius:9, padding:"10px 18px", cursor:"pointer", fontFamily:"'DM Mono',monospace", fontSize:11, fontWeight:700, color:"#fff", letterSpacing:"0.04em" }}>Find a {analysis.specialistNeeded.type} →</button>
                    </div>
                    <div style={{ background:C.bgMuted, border:`1px solid ${C.border}`, borderRadius:10, padding:"12px 14px" }}>
                      <div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textTiny, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:6 }}>Key details to share with the specialist</div>
                      {(analysis.diagnoses||[]).map((d,i)=><div key={i} style={{ display:"flex", gap:8, padding:"6px 0", borderBottom:`1px solid ${C.border}` }}><span style={{ color:C.orange, fontFamily:"'DM Mono',monospace", fontSize:10 }}>→</span><span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:12, color:C.textMid }}>{d}</span></div>)}
                      {(analysis.labFlags||[]).map((f,i)=><div key={i} style={{ display:"flex", gap:8, padding:"6px 0", borderBottom:`1px solid ${C.border}` }}><span style={{ color:C.amber, fontFamily:"'DM Mono',monospace", fontSize:10 }}>!</span><span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:12, color:C.textMid }}>{f}</span></div>)}
                    </div>
                  </div>
                ) : (
                  <div style={{ textAlign:"center", padding:"32px 0" }}>
                    <div style={{ fontSize:32, marginBottom:10 }}>✓</div>
                    <div style={{ fontFamily:"'Lora',serif", fontSize:15, color:C.textMid, marginBottom:6 }}>No specialist referral indicated from these records.</div>
                    <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:12, color:C.textSoft }}>You can still search for any doctor using the main search.</div>
                  </div>
                )}
              </div>
            )}

            {activeTab==="ask" && <>
              {messages.length===0 && <div style={{ padding:"12px 16px", borderBottom:`1px solid ${C.border}` }}><div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textTiny, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:7 }}>Suggested questions</div><div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>{QUICK_QS.map(q=><button key={q} onClick={()=>sendChat(q)} style={{ background:C.blueL, border:`1px solid ${C.blueBorder}`, borderRadius:20, padding:"4px 11px", cursor:"pointer", fontFamily:"'DM Sans',sans-serif", fontSize:11, color:C.blue }}>{q}</button>)}</div></div>}
              <div style={{ padding:"14px 16px", display:"flex", flexDirection:"column", gap:10, minHeight:200 }}>
                {messages.map((m,i)=>(

                    <div style={{ maxWidth:"84%", padding:"10px 13px", borderRadius:m.role==="user"?"12px 12px 3px 12px":"12px 12px 12px 3px", background:m.role==="user"?C.blue:C.bgMuted, color:m.role==="user"?"#fff":C.text, fontFamily:"'DM Sans',sans-serif", fontSize:13, lineHeight:1.65, border:m.role==="assistant"?`1px solid ${C.border}`:"none" }}>{m.text}</div>
                  </div>
                ))}
                {chatLoading && <div style={{ display:"flex" }}><div style={{ background:C.bgMuted, border:`1px solid ${C.border}`, borderRadius:"12px 12px 12px 3px", padding:"10px 14px", display:"flex", gap:5 }}>{[0,1,2].map(i=><div key={i} style={{ width:6, height:6, borderRadius:"50%", background:C.textSoft, animation:"pulse 1.2s ease infinite", animationDelay:`${i*0.18}s` }}/>)}</div></div>}

          {activeTab==="ask" ? (

              <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&sendChat()} placeholder="Ask anything about your records…" style={{ flex:1, border:`1px solid ${C.border}`, borderRadius:9, padding:"10px 13px", fontFamily:"'DM Sans',sans-serif", fontSize:13, color:C.text, outline:"none", background:C.bgCard }}/>
              <button onClick={()=>sendChat()} disabled={chatLoading||!input.trim()} style={{ background:chatLoading||!input.trim()?C.bgMuted:C.blue, border:"none", borderRadius:9, padding:"0 16px", cursor:chatLoading||!input.trim()?"default":"pointer", color:chatLoading||!input.trim()?C.textSoft:"#fff", fontFamily:"'DM Mono',monospace", fontSize:11, fontWeight:700, transition:"all 0.15s" }}>Send</button>
            </div>
          ) : (
            <div style={{ padding:"10px 16px", borderTop:`1px solid ${C.border}`, flexShrink:0 }}>
              <button onClick={()=>setActiveTab("ask")} style={{ width:"100%", background:C.bgMuted, border:`1px solid ${C.border}`, borderRadius:9, padding:"9px", cursor:"pointer", fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textMid, display:"flex", alignItems:"center", justifyContent:"center", gap:6 }}>💬 Ask a question about your records</button>

        </>}
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [query, setQuery]             = useState("");
  const [diagnosis, setDiagnosis]     = useState(null);
  const [ins, setIns]                 = useState("");
  const [showInsMenu, setShowInsMenu] = useState(false);
  const [results, setResults]         = useState([]);
  const [expl, setExpl]               = useState(null);
  const [contextNote, setContextNote] = useState(null);
  const [secondOpNote, setSecondOpNote] = useState(null);
  const [loading, setLoading]         = useState(false);
  const [searched, setSearched]       = useState(false);
  const [error, setError]             = useState(null);
  const [selected, setSelected]       = useState(null);
  const [scoreDoc, setScoreDoc]       = useState(null);
  const [showRecords, setShowRecords] = useState(false);
  const [isNameSearch, setIsNameSearch] = useState(false);
  const [resultTab, setResultTab]     = useState("top");

  // Detect if query looks like a doctor name search
  function detectNameSearch(q) {
    if (!q) return false;
    const lower = q.toLowerCase().trim();
    if (lower.startsWith("dr.") || lower.startsWith("dr ")) return true;
    // 2-3 word query with no medical keywords = likely a name
    const words = lower.split(/\s+/);
    const medicalTerms = ["surgeon","surgery","doctor","specialist","orthopedic","cardiac","spine","knee","hip","cancer","heart","back","pain","replacement","oncologist","neurologist","cardiologist","near","best","top","ca","tx","ny","fl","in","at","for"];
    if (words.length >= 2 && words.length <= 3 && !words.some(w => medicalTerms.includes(w))) return true;
    return false;
  }

  // Classify a doctor as having flags
  function hasFlags(doc) {
    return doc.lawsuits > 0 || doc.boardActions > 0 || doc.licenseStatus !== "Active" || doc.medicareOptOut || (doc.disciplinaryHistory && doc.disciplinaryHistory.length > 0);
  }

  const EXAMPLES = ["L4-L5 herniated disc","best knee surgeon near 92014","atrial fibrillation cardiologist Texas","oncologist Chicago no lawsuits"];

  const runSearch = useCallback(async (q, dx) => {
    const searchQ = dx ? `${dx.label} (ICD-10: ${dx.code})${q?" in "+q:""}` : q;
    if (!searchQ.trim()) return;
    const nameSearch = !dx && detectNameSearch(q);
    setIsNameSearch(nameSearch);
    setResultTab("top");
    setLoading(true); setError(null); setExpl(null); setResults([]); setContextNote(null); setSecondOpNote(null);
    try {
      const data = await callClaude(searchSystem(ins), searchQ);
      const spec = data.detectedSpecialty || data.specialty;
      setExpl(spec ? (data.keyProcedure ? `${spec} · Key procedure: ${data.keyProcedure}` : spec) : data.explanation || null);
      setContextNote(data.contextNote || null);
      setSecondOpNote(data.secondOpinionNote || null);
      setResults(data.doctors || []);
      setSearched(true);
    } catch(e) { setError(`Search failed: ${e.message}`); }
    finally { setLoading(false); }
  }, [ins]);

  return (
    <div style={{ minHeight:"100vh", background:C.bg, color:C.text, fontFamily:"'DM Sans',sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=DM+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600&display=swap');
        * { box-sizing:border-box; margin:0; padding:0; }
        ::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:${C.bg}; } ::-webkit-scrollbar-thumb { background:${C.border}; border-radius:3px; }
        input::placeholder, textarea::placeholder { font-family:'DM Sans',sans-serif; color:${C.textTiny}; }
        @keyframes spin  { to { transform:rotate(360deg); } }
        @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .pill:hover { border-color:${C.orange}!important; color:${C.orange}!important; background:${C.orangeL}!important; }
      `}</style>

      {/* Nav */}
      <nav style={{ background:C.bgCard, borderBottom:`1px solid ${C.border}`, padding:"0 24px", display:"flex", alignItems:"center", justifyContent:"space-between", height:52, position:"sticky", top:0, zIndex:50 }}>
        <div style={{ display:"flex", alignItems:"center", gap:2 }}>
          <span style={{ fontFamily:"'Lora',serif", fontSize:18, fontWeight:700, color:C.orange, letterSpacing:"-0.02em" }}>DOC</span>
          <span style={{ fontFamily:"'Lora',serif", fontSize:18, fontWeight:700, color:C.blue }}>TBD</span>
          <span style={{ marginLeft:5, background:C.orangeL, color:C.orange, border:`1px solid ${C.orangeBorder}`, borderRadius:4, padding:"1px 5px", fontFamily:"'DM Mono',monospace", fontSize:8, fontWeight:700, letterSpacing:"0.08em" }}>BETA</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:7 }}>
          {/* Insurance picker */}
          <div style={{ position:"relative" }}>
            <button onClick={()=>setShowInsMenu(!showInsMenu)} style={{ display:"flex", alignItems:"center", gap:5, background:ins?C.blueL:C.bgMuted, border:`1px solid ${ins?C.blue:C.border}`, borderRadius:8, padding:"5px 10px", cursor:"pointer", fontFamily:"'DM Mono',monospace", fontSize:9, color:ins?C.blue:C.textSoft }}>
              🏥 {ins||"My Insurance"} <span style={{ fontSize:8 }}>▾</span>
            </button>
            {showInsMenu && (
              <div style={{ position:"absolute", right:0, top:"110%", background:C.bgCard, border:`1px solid ${C.border}`, borderRadius:11, boxShadow:"0 8px 28px rgba(0,0,0,0.1)", zIndex:100, minWidth:210, maxHeight:300, overflowY:"auto", animation:"fadeUp 0.18s ease" }}>
                {ins && <button onClick={()=>{setIns("");setShowInsMenu(false);}} style={{ width:"100%", padding:"8px 12px", textAlign:"left", background:C.redL, border:"none", borderBottom:`1px solid ${C.border}`, cursor:"pointer", fontFamily:"'DM Mono',monospace", fontSize:10, color:C.red }}>✕ Remove filter</button>}
                {INSURANCE_OPTIONS.map(i=><button key={i} onClick={()=>{setIns(i);setShowInsMenu(false);}} style={{ width:"100%", padding:"8px 12px", textAlign:"left", background:ins===i?C.blueL:"none", border:"none", borderBottom:`1px solid ${C.border}`, cursor:"pointer", fontFamily:"'DM Sans',sans-serif", fontSize:13, color:ins===i?C.blue:C.textMid }}>{i}</button>)}
              </div>
            )}
          </div>
          {/* My Records */}
          <button onClick={()=>setShowRecords(true)} style={{ display:"flex", alignItems:"center", gap:5, background:C.greenL, border:`1px solid ${C.greenBorder}`, borderRadius:8, padding:"5px 10px", cursor:"pointer", fontFamily:"'DM Mono',monospace", fontSize:9, color:C.green, fontWeight:700 }}>
            🗂 My Records
          </button>
          <button onClick={()=>setScoreDoc({score:null,scoreBreakdown:null,name:null})} style={{ display:"flex", alignItems:"center", gap:5, background:C.bgMuted, border:`1px solid ${C.border}`, borderRadius:8, padding:"5px 10px", cursor:"pointer", fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textMid }}>
            ⓘ How scores work
          </button>
          <div style={{ display:"flex", alignItems:"center", gap:3 }}>
            <span style={{ width:5, height:5, borderRadius:"50%", background:C.green, display:"inline-block", boxShadow:`0 0 5px ${C.green}` }}/>
            <span style={{ fontFamily:"'DM Mono',monospace", fontSize:8, color:C.textTiny, letterSpacing:"0.05em" }}>LIVE</span>
          </div>
        </div>
      </nav>

      {/* Hero */}
      <div style={{ background:C.bgCard, borderBottom:`1px solid ${C.border}`, padding:"24px 24px 20px" }}>
        <div style={{ maxWidth:700, margin:"0 auto" }}>
          <h1 style={{ fontFamily:"'Lora',serif", fontSize:26, fontWeight:700, color:C.text, marginBottom:4, lineHeight:1.2, letterSpacing:"-0.01em" }}>Find the best doctor for what you need.</h1>
          <p style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:C.textMid, marginBottom:14, lineHeight:1.6 }}>Just describe what you need in plain English.</p>

          {ins && (
            <div style={{ display:"inline-flex", alignItems:"center", gap:5, background:C.blueL, border:`1px solid ${C.blueBorder}`, borderRadius:7, padding:"3px 9px", marginBottom:9 }}>
              <span style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.blue, fontWeight:700 }}>✓ Insurance: {ins}</span>
              <button onClick={()=>setIns("")} style={{ background:"none", border:"none", cursor:"pointer", color:C.blue, fontSize:10 }}>✕</button>
            </div>
          )}

          {/* Search bar */}
          <div style={{ display:"flex", background:C.bgCard, border:`2px solid ${C.orange}`, borderRadius:11, overflow:"hidden", boxShadow:"0 3px 16px rgba(232,101,10,0.08)", marginBottom:10 }}>
            {diagnosis && (
              <div style={{ display:"flex", alignItems:"center", background:C.orangeL, borderRight:`1px solid ${C.orangeBorder}`, padding:"0 10px", fontFamily:"'DM Mono',monospace", fontSize:9, color:C.orange, whiteSpace:"nowrap", gap:5 }}>
                <span style={{ fontWeight:700 }}>{diagnosis.code}</span>
                <button onClick={()=>setDiagnosis(null)} style={{ background:"none", border:"none", cursor:"pointer", color:C.orange, fontSize:11 }}>✕</button>
              </div>
            )}
            <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==="Enter"&&runSearch(query,diagnosis)}
              placeholder={diagnosis?"Location or other details (optional)":"e.g. 'best knee surgeon near 92014' or 'herniated disc L4-L5'"}
              style={{ flex:1, background:"transparent", border:"none", outline:"none", color:C.text, fontFamily:"'DM Sans',sans-serif", fontSize:14, padding:"12px 14px" }}/>
            <button onClick={()=>runSearch(query,diagnosis)} disabled={loading} style={{ background:loading?C.bgMuted:C.orange, border:"none", padding:"0 18px", color:loading?C.textSoft:"#fff", fontFamily:"'DM Mono',monospace", fontSize:11, fontWeight:700, cursor:loading?"default":"pointer", letterSpacing:"0.06em", display:"flex", alignItems:"center", gap:6, transition:"background 0.2s", borderLeft:`1px solid ${C.border}` }}>
              {loading?<div style={{ width:13,height:13,border:`2px solid ${C.orange}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.7s linear infinite" }}/>:"Search →"}
            </button>
          </div>

          <div style={{ display:"flex", gap:5, flexWrap:"wrap", alignItems:"center" }}>
            <span style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textTiny, letterSpacing:"0.06em", textTransform:"uppercase" }}>Try:</span>
            {EXAMPLES.map(ex=><button key={ex} className="pill" onClick={()=>{setQuery(ex);setDiagnosis(null);runSearch(ex,null);}} style={{ background:C.bgMuted, border:`1px solid ${C.border}`, borderRadius:20, padding:"3px 10px", color:C.textMid, fontFamily:"'DM Mono',monospace", fontSize:9, cursor:"pointer", transition:"all 0.15s" }}>{ex}</button>)}
          </div>
        </div>
      </div>

      {/* Results */}
      <div style={{ maxWidth:700, margin:"0 auto", padding:"16px 24px 60px" }}>
        {expl && <div style={{ display:"flex", alignItems:"center", gap:6, background:C.orangeL, border:`1px solid ${C.orangeBorder}`, borderRadius:9, padding:"8px 12px", marginBottom:11, animation:"fadeUp 0.3s ease both" }}><span style={{ color:C.orange }}>✦</span><span style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:"#7C3A00", flex:1 }}>{expl}</span><button onClick={()=>{setResults([]);setExpl(null);setSearched(false);}} style={{ background:"none",border:"none",color:C.textSoft,cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:9 }}>Clear ✕</button></div>}
        {contextNote && <div style={{ background:C.greenL, border:`1px solid ${C.greenBorder}`, borderRadius:10, padding:"10px 13px", marginBottom:10, animation:"fadeUp 0.35s ease both" }}><div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.green, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:3 }}>What to look for</div><div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:C.green, lineHeight:1.6 }}>{contextNote}</div></div>}
        {secondOpNote && <div style={{ background:C.amberL, border:`1px solid ${C.amberBorder}`, borderRadius:10, padding:"9px 12px", marginBottom:10, animation:"fadeUp 0.4s ease both" }}><div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.amber, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:2 }}>⚠ Second Opinion Guidance</div><div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:"#7C4A00", lineHeight:1.6 }}>{secondOpNote}</div></div>}
        {error && <div style={{ padding:"8px 12px", background:C.redL, border:`1px solid ${C.redBorder}`, borderRadius:9, color:C.red, fontFamily:"'DM Mono',monospace", fontSize:11, marginBottom:12 }}>{error}</div>}

        {!searched && !loading && (
          <div style={{ textAlign:"center", padding:"52px 0" }}>
            <div style={{ fontSize:42, marginBottom:10 }}>🩺</div>
            <div style={{ fontFamily:"'Lora',serif", fontSize:16, color:C.textSoft, marginBottom:6 }}>Search for a doctor above, or pick a diagnosis</div>
            <div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textTiny, lineHeight:2, marginBottom:16 }}>
              License status · Lawsuit history with court links · All practice locations<br/>All insurance plans · Procedure volume · Board certification
            </div>
            <button onClick={()=>setShowRecords(true)} style={{ display:"inline-flex", alignItems:"center", gap:6, background:C.greenL, border:`1px solid ${C.greenBorder}`, borderRadius:9, padding:"8px 16px", cursor:"pointer", fontFamily:"'DM Mono',monospace", fontSize:9, color:C.green, fontWeight:700 }}>
              🗂 Upload your records and ask questions about your diagnosis
            </button>
          </div>
        )}

        {loading && <div style={{ display:"flex", flexDirection:"column", gap:9 }}>{[1,2,3].map(i=><div key={i} style={{ background:C.bgCard, border:`1.5px solid ${C.border}`, borderRadius:14, height:115, animation:"pulse 1.4s ease infinite", animationDelay:`${i*0.14}s` }}/>)}</div>}

        {!loading && searched && (() => {
          const clean = results.filter(d => !hasFlags(d));
          const flagged = results.filter(d => hasFlags(d));
          // Name search: show all (flagged is most useful). Condition search: tab between top/flags
          const showTabs = !isNameSearch && flagged.length > 0;
          const displayDocs = isNameSearch ? results : (resultTab === "top" ? clean : flagged);
          return (
            <>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10, flexWrap:"wrap", gap:8 }}>
                <div style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C.textTiny, letterSpacing:"0.07em", textTransform:"uppercase" }}>
                  {results.length} providers found{ins?` · ${ins} filter`:""} · <button onClick={()=>setScoreDoc({score:null})} style={{ background:"none", border:"none", cursor:"pointer", fontFamily:"'DM Mono',monospace", fontSize:9, color:C.blue, textDecoration:"underline", padding:0 }}>How scores work →</button>
                </div>
                {showTabs && (
                  <div style={{ display:"flex", background:C.bgMuted, borderRadius:8, padding:2, border:`1px solid ${C.border}`, gap:2 }}>
                    <button onClick={()=>setResultTab("top")} style={{ background:resultTab==="top"?C.bgCard:"transparent", border:resultTab==="top"?`1px solid ${C.border}`:"1px solid transparent", borderRadius:6, padding:"4px 12px", cursor:"pointer", fontFamily:"'DM Mono',monospace", fontSize:9, fontWeight:700, color:resultTab==="top"?C.green:C.textSoft, boxShadow:resultTab==="top"?"0 1px 3px rgba(0,0,0,0.07)":"none" }}>
                      ✓ Top picks ({clean.length})
                    </button>
                    <button onClick={()=>setResultTab("flags")} style={{ background:resultTab==="flags"?C.bgCard:"transparent", border:resultTab==="flags"?`1px solid ${C.redBorder}`:"1px solid transparent", borderRadius:6, padding:"4px 12px", cursor:"pointer", fontFamily:"'DM Mono',monospace", fontSize:9, fontWeight:700, color:resultTab==="flags"?C.red:C.textSoft, boxShadow:resultTab==="flags"?"0 1px 3px rgba(0,0,0,0.07)":"none" }}>
                      ⚠ Flagged ({flagged.length})
                    </button>
                  </div>
                )}
              </div>
              {showTabs && resultTab==="flags" && (
                <div style={{ background:C.amberL, border:`1px solid ${C.amberBorder}`, borderRadius:9, padding:"8px 12px", marginBottom:10, fontFamily:"'DM Sans',sans-serif", fontSize:12, color:C.amber, lineHeight:1.6 }}>
                  ⚠ These providers have one or more flags: lawsuit history, board actions, inactive license, or Medicare opt-out. Review carefully before booking.
                </div>
              )}
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                {displayDocs.length > 0
                  ? displayDocs.map((doc,i)=><DoctorCard key={doc.id??i} doc={doc} onClick={setSelected} onScoreClick={setScoreDoc} index={i} ins={ins}/>)
                  : <div style={{ textAlign:"center", padding:"32px 0", fontFamily:"'DM Mono',monospace", fontSize:11, color:C.textSoft }}>{resultTab==="flags" ? "No flagged providers in these results." : "No results — try a different search."}</div>
                }
              </div>
            </>
          );
        })()}
      </div>

      {selected  && <DoctorDetail doc={selected} onClose={()=>setSelected(null)} ins={ins} onScoreClick={d=>{setSelected(null);setScoreDoc(d);}}/>}
      {scoreDoc  && <ScoreExplainer breakdown={scoreDoc.scoreBreakdown} score={scoreDoc.score} name={scoreDoc.name} onClose={()=>setScoreDoc(null)}/>}
      {showRecords && <RecordsPanel onClose={()=>setShowRecords(false)} onSearchFromRecords={(q)=>{setQuery(q);setDiagnosis(null);runSearch(q,null);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
